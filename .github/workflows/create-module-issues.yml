      # ─────────────────────────────────────────────────────────────
      # VINCULACIÓN AL PROYECTO V2
      # ─────────────────────────────────────────────────────────────
      - name: Agregar todos los issues al Proyecto V2
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ github.event.inputs.project_number }}
          NODE_ID_USR001: ${{ steps.usr001.outputs.node_id }}
          NODE_ID_USR002: ${{ steps.usr002.outputs.node_id }}
          NODE_ID_USR003: ${{ steps.usr003.outputs.node_id }}
          NODE_ID_USR004: ${{ steps.usr004.outputs.node_id }}
          NODE_ID_USR005: ${{ steps.usr005.outputs.node_id }}
          NODE_ID_CLI001: ${{ steps.cli001.outputs.node_id }}
          NODE_ID_CLI002: ${{ steps.cli002.outputs.node_id }}
          NODE_ID_CLI003: ${{ steps.cli003.outputs.node_id }}
          NODE_ID_CLI004: ${{ steps.cli004.outputs.node_id }}
          NODE_ID_CLS001: ${{ steps.cls001.outputs.node_id }}
          NODE_ID_CLS002: ${{ steps.cls002.outputs.node_id }}
          NODE_ID_CLS003: ${{ steps.cls003.outputs.node_id }}
          NODE_ID_RSV001: ${{ steps.rsv001.outputs.node_id }}
          NODE_ID_RSV002: ${{ steps.rsv002.outputs.node_id }}
          NODE_ID_RSV003: ${{ steps.rsv003.outputs.node_id }}
          NODE_ID_RSV004: ${{ steps.rsv004.outputs.node_id }}
          NODE_ID_RSV005: ${{ steps.rsv005.outputs.node_id }}
          NODE_ID_AST001: ${{ steps.ast001.outputs.node_id }}
          NODE_ID_AST002: ${{ steps.ast002.outputs.node_id }}
          NODE_ID_AST003: ${{ steps.ast003.outputs.node_id }}
          NODE_ID_ADM001: ${{ steps.adm001.outputs.node_id }}
          NODE_ID_ADM002: ${{ steps.adm002.outputs.node_id }}
          NODE_ID_ADM003: ${{ steps.adm003.outputs.node_id }}
          NODE_ID_ADM004: ${{ steps.adm004.outputs.node_id }}
          NODE_ID_RPT001: ${{ steps.rpt001.outputs.node_id }}
          NODE_ID_RPT002: ${{ steps.rpt002.outputs.node_id }}
          NODE_ID_RPT003: ${{ steps.rpt003.outputs.node_id }}
          NODE_ID_RPT004: ${{ steps.rpt004.outputs.node_id }}
          NODE_ID_RPT005: ${{ steps.rpt005.outputs.node_id }}
          NODE_ID_RPT006: ${{ steps.rpt006.outputs.node_id }}
          NODE_ID_RPT007: ${{ steps.rpt007.outputs.node_id }}
          NODE_ID_COM001: ${{ steps.com001.outputs.node_id }}
          NODE_ID_COM002: ${{ steps.com002.outputs.node_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);
            const owner = context.repo.owner;
            const nodeIds = [
              process.env.NODE_ID_USR001, process.env.NODE_ID_USR002,
              process.env.NODE_ID_USR003, process.env.NODE_ID_USR004,
              process.env.NODE_ID_USR005,
              process.env.NODE_ID_CLI001, process.env.NODE_ID_CLI002,
              process.env.NODE_ID_CLI003, process.env.NODE_ID_CLI004,
              process.env.NODE_ID_CLS001, process.env.NODE_ID_CLS002,
              process.env.NODE_ID_CLS003,
              process.env.NODE_ID_RSV001, process.env.NODE_ID_RSV002,
              process.env.NODE_ID_RSV003, process.env.NODE_ID_RSV004,
              process.env.NODE_ID_RSV005,
              process.env.NODE_ID_AST001, process.env.NODE_ID_AST002,
              process.env.NODE_ID_AST003,
              process.env.NODE_ID_ADM001, process.env.NODE_ID_ADM002,
              process.env.NODE_ID_ADM003, process.env.NODE_ID_ADM004,
              process.env.NODE_ID_RPT001, process.env.NODE_ID_RPT002,
              process.env.NODE_ID_RPT003, process.env.NODE_ID_RPT004,
              process.env.NODE_ID_RPT005, process.env.NODE_ID_RPT006,
              process.env.NODE_ID_RPT007,
              process.env.NODE_ID_COM001, process.env.NODE_ID_COM002,
            ];

            // Obtener el node ID del proyecto
            let projectNodeId;
            try {
              const projectResult = await github.graphql(`
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      title
                    }
                  }
                }
              `, { owner, number: projectNumber });
              projectNodeId = projectResult.user.projectV2.id;
              console.log(`📋 Proyecto encontrado: "${projectResult.user.projectV2.title}" (ID: ${projectNodeId})`);
            } catch (e) {
              console.log(`⚠️  No se pudo obtener el proyecto #${projectNumber}: ${e.message}`);
              console.log('Para agregar los issues al proyecto manualmente:');
              console.log(`   1. Ve a https://github.com/users/${owner}/projects/${projectNumber}`);
              console.log('   2. Haz clic en "+" > "Add item from repository"');
              console.log('   3. Busca y agrega los issues USR, CLI, CLS, RSV, AST, ADM, RPT y COM');
              return;
            }

            // Agregar cada issue al proyecto
            let linked = 0;
            for (const nodeId of nodeIds) {
              if (!nodeId) continue;
              try {
                const result = await github.graphql(`
                  mutation($project: ID!, $item: ID!) {
                    addProjectV2ItemById(input: {projectId: $project, contentId: $item}) {
                      item { id }
                    }
                  }
                `, { project: projectNodeId, item: nodeId });
                console.log(`✅ Issue vinculado al proyecto (item ID: ${result.addProjectV2ItemById.item.id})`);
                linked++;
              } catch (e) {
                console.log(`⚠️  No se pudo vincular issue al proyecto: ${e.message}`);
              }
            }

            console.log('');
            console.log(`🎉 Proceso completado. ${linked} issues vinculados al proyecto.`);
            console.log(`   Proyecto: https://github.com/users/${owner}/projects/${projectNumber}`);
