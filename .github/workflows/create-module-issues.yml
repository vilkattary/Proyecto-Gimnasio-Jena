name: Crear Issues - Módulos de User Stories

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "Número del proyecto GitHub V2 donde se vincularán los issues (ej: 3)"
        required: false
        default: "3"

permissions:
  issues: write
  repository-projects: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:

      # ─────────────────────────────────────────────────────────────
      # MÓDULO USUARIOS
      # ─────────────────────────────────────────────────────────────
      - name: Crear USR-001 - Registro de usuario
        id: usr001
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[USR-001] Registro de usuario',
              body: [
                '### Módulo',
                'Usuarios',
                '',
                '### Descripción',
                'Como visitante quiero registrarme en el sistema proporcionando mis datos personales para obtener acceso a los servicios del gimnasio.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El formulario de registro solicita: nombre completo, correo electrónico, contraseña y confirmación de contraseña.',
                '- El sistema valida que el correo no esté registrado previamente.',
                '- La contraseña debe cumplir requisitos mínimos de seguridad (mínimo 8 caracteres).',
                '- Al registrarse exitosamente, el usuario recibe un correo de confirmación.',
                '- El sistema asigna el rol de "Cliente" por defecto al nuevo usuario.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El visitante completa y envía el formulario con datos válidos | Se crea la cuenta y se redirige al dashboard del cliente |',
                '| El correo ya existe en el sistema | Se muestra un mensaje de error indicando que el correo ya está registrado |',
                '| La contraseña no cumple los requisitos | Se muestra un mensaje de validación descriptivo |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear USR-002 - Login de usuario
        id: usr002
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[USR-002] Login de usuario',
              body: [
                '### Módulo',
                'Usuarios',
                '',
                '### Descripción',
                'Como usuario registrado quiero iniciar sesión en el sistema con mis credenciales para acceder a las funciones de mi perfil.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El formulario de login solicita correo electrónico y contraseña.',
                '- El sistema valida las credenciales contra la base de datos.',
                '- Tras un login exitoso, el usuario es redirigido a la vista correspondiente según su rol.',
                '- El sistema muestra un mensaje de error genérico si las credenciales son incorrectas.',
                '- Se bloquea el acceso tras múltiples intentos fallidos consecutivos.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El usuario ingresa credenciales válidas | Se inicia sesión y se redirige según el rol asignado |',
                '| El usuario ingresa credenciales incorrectas | Se muestra mensaje de error y se contabiliza el intento fallido |',
                '| El usuario supera el límite de intentos | Se bloquea temporalmente el acceso a la cuenta |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear USR-003 - Recuperación de contraseña
        id: usr003
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[USR-003] Recuperación de contraseña',
              body: [
                '### Módulo',
                'Usuarios',
                '',
                '### Descripción',
                'Como usuario registrado quiero recuperar el acceso a mi cuenta mediante mi correo electrónico cuando olvide mi contraseña.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El usuario puede solicitar el restablecimiento ingresando su correo electrónico registrado.',
                '- El sistema envía un enlace de recuperación con expiración a la dirección de correo indicada.',
                '- El enlace de recuperación permite al usuario definir una nueva contraseña.',
                '- Una vez utilizado, el enlace queda inválido para evitar reutilización.',
                '- Si el correo no está registrado, el sistema responde con un mensaje neutro (sin revelar si existe o no).',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El usuario solicita recuperación con correo válido | Se envía un enlace de restablecimiento al correo |',
                '| El usuario accede al enlace y define nueva contraseña | La contraseña se actualiza y el enlace queda inválido |',
                '| El enlace ha expirado | Se muestra mensaje de expiración y se ofrece solicitar uno nuevo |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear USR-004 - Gestión de roles
        id: usr004
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[USR-004] Gestión de roles',
              body: [
                '### Módulo',
                'Usuarios',
                '',
                '### Descripción',
                'Como administrador quiero asignar y modificar roles a los usuarios del sistema para controlar sus niveles de acceso y permisos.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El administrador puede ver el listado de usuarios con sus roles actuales.',
                '- El sistema soporta al menos los roles: Administrador, Recepcionista, Entrenador y Cliente.',
                '- El administrador puede cambiar el rol de cualquier usuario desde el panel administrativo.',
                '- Los cambios de rol surten efecto de forma inmediata en la siguiente sesión del usuario afectado.',
                '- El sistema registra un historial de cambios de rol para auditoría.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El administrador asigna un nuevo rol a un usuario | El rol se actualiza y el usuario tendrá los permisos del nuevo rol en su próxima sesión |',
                '| El administrador intenta asignar un rol inválido | El sistema muestra un error de validación |',
                '| El administrador consulta el historial de roles | Se muestra el registro de cambios con fecha, usuario afectado y administrador responsable |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear USR-005 - Actualización de perfil
        id: usr005
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[USR-005] Actualización de perfil',
              body: [
                '### Módulo',
                'Usuarios',
                '',
                '### Descripción',
                'Como usuario autenticado quiero actualizar mi información personal en el perfil para mantener mis datos al día.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El usuario puede editar su nombre, teléfono, dirección y foto de perfil.',
                '- El correo electrónico solo puede cambiarse con confirmación adicional.',
                '- Los cambios se validan antes de guardarlos (campos obligatorios, formato de teléfono, etc.).',
                '- El sistema muestra un mensaje de confirmación al guardar los cambios exitosamente.',
                '- El usuario puede cancelar los cambios y revertir al estado anterior.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El usuario edita sus datos y guarda | Se actualiza el perfil y se muestra confirmación |',
                '| El usuario intenta guardar con campos inválidos | Se muestran mensajes de error en los campos correspondientes |',
                '| El usuario cancela la edición | Se descartan los cambios y se muestra el perfil original |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      # ─────────────────────────────────────────────────────────────
      # MÓDULO CLIENTES
      # ─────────────────────────────────────────────────────────────
      - name: Crear CLI-001 - Consulta de perfil de cliente
        id: cli001
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLI-001] Consulta de perfil de cliente',
              body: [
                '### Módulo',
                'Clientes',
                '',
                '### Descripción',
                'Como cliente autenticado quiero consultar mi perfil completo para verificar mis datos personales y el estado de mi cuenta.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El cliente puede ver su información personal: nombre, correo, teléfono y foto de perfil.',
                '- Se muestra el historial de membresías y el estado actual (activa/inactiva/vencida).',
                '- Se presenta un resumen de las clases reservadas y asistencias registradas.',
                '- La información se carga correctamente y de forma rápida.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El cliente accede a su perfil | Se muestra su información personal y resumen de actividad |',
                '| La membresía está vencida | Se resalta el estado y se muestra una opción para renovar |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear CLI-002 - Consulta de membresía
        id: cli002
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLI-002] Consulta de membresía',
              body: [
                '### Módulo',
                'Clientes',
                '',
                '### Descripción',
                'Como cliente autenticado quiero consultar el detalle de mi membresía actual para conocer su vigencia, beneficios y próxima fecha de pago.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- Se muestra el tipo de plan, fecha de inicio, fecha de vencimiento y estado de la membresía.',
                '- Se listan los beneficios incluidos en el plan actual.',
                '- Se notifica cuando la membresía está próxima a vencer (menos de 7 días).',
                '- El cliente puede ver el historial de pagos asociados a su membresía.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El cliente consulta su membresía vigente | Se muestran los detalles del plan y su vigencia |',
                '| La membresía vence en menos de 7 días | Se muestra una alerta de renovación próxima |',
                '| El cliente no tiene membresía activa | Se muestra un mensaje invitando a adquirir un plan |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear CLI-003 - Consulta de clases disponibles
        id: cli003
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLI-003] Consulta de clases disponibles',
              body: [
                '### Módulo',
                'Clientes',
                '',
                '### Descripción',
                'Como cliente autenticado quiero consultar las clases disponibles para elegir y reservar las que se ajusten a mi horario.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- Se muestra un listado de clases con nombre, instructor, horario, duración y cupos disponibles.',
                '- El cliente puede filtrar por día, tipo de clase o instructor.',
                '- Las clases sin cupos disponibles se muestran como "Llenas" y no permiten reserva.',
                '- Las clases ya reservadas por el cliente se marcan visualmente.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El cliente consulta las clases disponibles | Se muestra el listado con información completa y cupos restantes |',
                '| El cliente aplica un filtro | La lista se actualiza mostrando solo las clases que cumplen el criterio |',
                '| Una clase no tiene cupos | Se muestra como "Llena" y el botón de reserva está deshabilitado |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear CLI-004 - Confirmación por correo
        id: cli004
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLI-004] Confirmación por correo',
              body: [
                '### Módulo',
                'Clientes',
                '',
                '### Descripción',
                'Como cliente quiero recibir correos de confirmación para las acciones relevantes (registro, reservas, cancelaciones) y tener un registro fuera del sistema.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- Se envía un correo de bienvenida al completar el registro.',
                '- Se envía confirmación al realizar una reserva de clase con fecha, hora y nombre de la clase.',
                '- Se envía notificación al cancelar una reserva.',
                '- Los correos incluyen el logo del gimnasio y un diseño coherente con la marca.',
                '- El correo se entrega dentro de los 2 minutos siguientes a la acción.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El cliente se registra exitosamente | Se envía correo de bienvenida con sus datos y próximos pasos |',
                '| El cliente confirma una reserva | Se envía correo con el detalle de la clase reservada |',
                '| El cliente cancela una reserva | Se envía correo notificando la cancelación |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      # ─────────────────────────────────────────────────────────────
      # MÓDULO CLASES
      # ─────────────────────────────────────────────────────────────
      - name: Crear CLS-001 - Creación de clases
        id: cls001
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLS-001] Creación de clases',
              body: [
                '### Módulo',
                'Clases',
                '',
                '### Descripción',
                'Como administrador quiero crear nuevas clases en el sistema definiendo sus características para ofrecerlas a los clientes.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El formulario de creación solicita: nombre, descripción, instructor asignado, horario (día y hora), duración y cupos máximos.',
                '- Todos los campos obligatorios deben estar completos para guardar la clase.',
                '- El sistema valida que no existan conflictos de horario para el instructor asignado.',
                '- La clase creada aparece inmediatamente disponible para consulta y reserva.',
                '- Se notifica al instructor asignado sobre la nueva clase.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El administrador completa y guarda el formulario con datos válidos | La clase se crea y queda disponible en el sistema |',
                '| Existe un conflicto de horario para el instructor | Se muestra un error indicando el conflicto |',
                '| Un campo obligatorio está vacío | Se resalta el campo faltante con mensaje de validación |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear CLS-002 - Edición de clases
        id: cls002
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLS-002] Edición de clases',
              body: [
                '### Módulo',
                'Clases',
                '',
                '### Descripción',
                'Como administrador quiero editar la información de una clase existente para corregir datos o actualizar horarios y asignaciones.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El administrador puede modificar cualquier campo de la clase (nombre, descripción, instructor, horario, duración).',
                '- El sistema notifica a los clientes con reservas activas si el horario de la clase cambia.',
                '- Se validan conflictos de horario del instructor al modificar el horario.',
                '- Los cambios se guardan solo si todos los campos obligatorios son válidos.',
                '- Se muestra un historial de cambios de la clase.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El administrador edita y guarda cambios válidos | La clase se actualiza y se notifica a los afectados |',
                '| Se cambia el horario con reservas activas | Se notifica a los clientes inscritos sobre el cambio |',
                '| Hay conflicto de horario con el instructor | Se muestra error y no se guarda el cambio |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear CLS-003 - Definición de cupos
        id: cls003
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CLS-003] Definición de cupos',
              body: [
                '### Módulo',
                'Clases',
                '',
                '### Descripción',
                'Como administrador quiero definir y ajustar el número de cupos máximos de cada clase para controlar la capacidad y garantizar la calidad del servicio.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El administrador puede establecer el número máximo de cupos al crear o editar una clase.',
                '- El sistema no permite reducir los cupos a un número menor al de reservas ya existentes.',
                '- El número de cupos disponibles se actualiza en tiempo real al realizarse reservas o cancelaciones.',
                '- El sistema muestra la ocupación actual (cupos usados / cupos totales) en el panel de administración.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El administrador define los cupos al crear la clase | El límite de reservas queda configurado y se aplica automáticamente |',
                '| El administrador intenta reducir cupos por debajo de las reservas activas | Se muestra error indicando la cantidad mínima permitida |',
                '| Un cliente reserva un lugar | Los cupos disponibles disminuyen en uno en tiempo real |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      # ─────────────────────────────────────────────────────────────
      # MÓDULO RESERVAS
      # ─────────────────────────────────────────────────────────────
      - name: Crear RSV-001 - Reserva de clase
        id: rsv001
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[RSV-001] Reserva de clase',
              body: [
                '### Módulo',
                'Reservas',
                '',
                '### Descripción',
                'Como cliente autenticado quiero reservar un lugar en una clase disponible para asegurar mi participación.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El cliente puede reservar una clase desde el listado de clases disponibles.',
                '- El sistema verifica que haya cupos disponibles antes de confirmar la reserva.',
                '- El sistema verifica que el cliente tenga una membresía activa y vigente.',
                '- Se permite solo una reserva por clase por cliente.',
                '- Al confirmar la reserva, el cliente recibe una notificación por correo.',
                '',
                '### Flujo (Evento/Resultado)',
                '',
                '| Evento | Resultado |',
                '|--------|-----------|',
                '| El cliente selecciona una clase con cupos y membresía vigente | Se confirma la reserva y se descuenta un cupo disponible |',
                '| La clase no tiene cupos disponibles | Se muestra mensaje informativo y no se crea la reserva |',
                '| El cliente ya tiene una reserva en esa clase | Se muestra mensaje indicando que ya está inscrito |',
              ].join('\n')
            });
            console.log(`✅ Issue creado: #${issue.number} - ${issue.title}`);
            console.log(`   URL: ${issue.html_url}`);
            core.setOutput('number', String(issue.number));
            core.setOutput('node_id', issue.node_id);

      - name: Crear RSV-002 - Cancelación de reserva
        id: rsv002
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[RSV-002] Cancelación de reserva',
              body: [
                '### Módulo',
                'Reservas',
                '',
                '### Descripción',
                'Como cliente autenticado quiero cancelar una reserva de clase cuando no pueda asistir para liberar el cupo a otros clientes.',
                '',
                '### Escenarios y Criterios de Aceptación',
                '',
                '- El cliente puede cancelar una reserva desde su historial de reservas.',
